
services:
  web:
    image: next-app-image
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - WATCHPACK_POLLING=true
    depends_on:
      - db
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Fortnite31
      MYSQL_DATABASE: next-todo-app
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
  mysql_data: {}